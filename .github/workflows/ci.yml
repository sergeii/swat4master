name: ci

on: [push]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.meta.outputs.date }}
    steps:
      - name: Configure build meta
        id: meta
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  smoke-binary:
    runs-on: ${{ matrix.goarch.runner }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: go mod verify

      - name: Generate API docs
        run: make generate-api-docs

      - name: Build test binary
        run: >-
          make build
          GOOS=linux
          GOARCH=${{ matrix.goarch.name }}
          BUILD_TIME=${{ needs.meta.outputs.date }}
          BUILD_COMMIT=${{ github.sha }}
          BUILD_VERSION=${{ github.ref_name }}

      - name: Test built binary
        run: ./swat4master version

  smoke-image:
    runs-on: ${{ matrix.platform.runner }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        platform:
          - id: amd64
            name: linux/amd64
            runner: ubuntu-24.04
          - id: arm64
            name: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: testing
          platforms: ${{ matrix.platform.name }}
          build-args: |
            build_commit_sha=${{ github.sha }}
            build_version=testing
            build_time=${{ needs.meta.outputs.date }}

      - name: Test built image
        run: docker run --rm testing version
